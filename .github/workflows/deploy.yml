name: Deploy Backend

on:
  push:
    branches: [main]

concurrency:
  group: deploy-wallet-backend-main
  cancel-in-progress: true

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy Backend
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/walletPacketBackend
            PREV_HEAD="$(git rev-parse HEAD)"
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            NEW_HEAD="$(git rev-parse HEAD)"
            echo "Deploying $PREV_HEAD -> $NEW_HEAD"
            CHANGED_FILES="$(git diff --name-only "$PREV_HEAD" "$NEW_HEAD")"
            echo "$CHANGED_FILES"

            if echo "$CHANGED_FILES" | grep -Eq '^(package\.json|package-lock\.json)$'; then
              npm ci --no-audit --prefer-offline --progress=false
            else
              echo "Skip npm ci: dependencies unchanged"
            fi

            if echo "$CHANGED_FILES" | grep -Eq '^(prisma/schema\.prisma|package\.json|package-lock\.json)$'; then
              npm run prisma:generate
            else
              echo "Skip prisma generate: schema unchanged"
            fi

            if echo "$CHANGED_FILES" | grep -Eq '^(src/|prisma/|package\.json|package-lock\.json|tsconfig.*\.json|nest-cli\.json)'; then
              npm run build
              pm2 startOrReload ecosystem.config.cjs --only wallet-packet-backend
              pm2 save
            else
              echo "Skip build/restart: no backend runtime changes"
            fi
